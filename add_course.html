<!DOCTYPE html>
<html>
    <head>
        <title>Personal Course Organizer</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="This is your course organizer, enter now" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <h1>Personal Course Organizer</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="courses.html">My Courses</a></li>
                    <li><a href="add_course.html">Add Course</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav> 
        </header>
        <main>
            <section>
                <h2>Add a New Course</h2>
                <form method="post" class="form-container">
                    <div class="form-group">
                        <label for="course_name">Course Name:</label>
                        <input type="text" id="course_name" name="course_name" required>
                    </div>

                    <div class="form-group">  
                        <label for="instructor">Instructor:</label>
                        <input type="text" id="instructor" name="instructor" required>
                    </div>

                    <div class="form-group">   
                        <label for="credits">Credit Hours:</label>
                        <input type="number" id="credits" name="credits" min="1" max="5" required>
                    </div>

                    <div class="form-group">    
                        <label for="notes">Notes:</label>
                        <textarea id="notes" name="notes"></textarea>
                    </div>

                    <input type="submit" class="submit" value="Add Course">
                </form>
            </section>
        </main>
        <footer>
            <p>&copy; Designed by Omar Mohamed 2026 _ Personal Course Organizer _ All rights reserved</p>
        </footer>
    </body>
</html>
