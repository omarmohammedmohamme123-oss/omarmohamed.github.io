<!DOCTYPE html>
<html>
    <head>
        <title>Personal Course Organizer</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="This is your course organizer, enter now" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <h1>Personal Course Organizer</h1>
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="courses.html">My Courses</a></li>
                    <li><a href="add_course.html">Add Course</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav> 
        </header>
        <main>
            <section>
                <h2>Contact Us</h2>
                <p>If you have any questions or need assistance, please feel free to contact us:</p>
                <form method="post" class="form-container">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">  
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">   
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>

                    <input type="submit" class="submit" value="Send Message">
                </form>
            </section>
        </main>
        <footer>
            <p>&copy; Designed by Omar Mohamed 2026 _ Personal Course Organizer _ All rights reserved</p>
        </footer>
    </body>
</html>
